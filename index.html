<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentorix - Sistem Mentoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.98); }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans">

<div class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-8 fade-in border border-slate-100">

    <div id="landing">
        <h1 class="text-3xl font-bold text-center mb-2 text-slate-700">Mentorix</h1>
        <p class="text-center text-slate-400 mb-8 font-medium">Pilih kategori mentoring</p>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="selectGender('Akhwat')" class="py-5 bg-pink-100 hover:bg-pink-200 text-pink-700 rounded-2xl font-bold text-lg transition-all shadow-sm border border-pink-200 cursor-pointer">
                🌸 Akhwat
            </button>
            <button onclick="selectGender('Ikhwan')" class="py-5 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-2xl font-bold text-lg transition-all shadow-sm border border-blue-200 cursor-pointer">
                🛡️ Ikhwan
            </button>
        </div>
    </div>

    <div id="angkatanPage" class="hidden text-center">
        <h2 class="text-xl font-bold mb-6 text-slate-700">Pilih Angkatan</h2>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="selectAngkatan('27')" class="py-3 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-xl font-semibold text-slate-600 cursor-pointer text-sm">Angkatan 27</button>
            <button onclick="selectAngkatan('28')" class="py-3 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-xl font-semibold text-slate-600 cursor-pointer text-sm">Angkatan 28</button>
            <button onclick="selectAngkatan('29')" class="py-3 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-xl font-semibold text-slate-600 cursor-pointer text-sm">Angkatan 29</button>
            <button onclick="selectAngkatan('Lainnya')" class="py-3 bg-slate-50 border border-dashed border-slate-300 hover:bg-slate-100 rounded-xl font-semibold text-slate-400 cursor-pointer text-sm italic">Lainnya / Umum</button>
        </div>
        <button onclick="showPage('landing')" class="mt-8 text-sm text-slate-400 hover:text-slate-600 font-medium underline cursor-pointer">← Kembali</button>
    </div>

    <div id="formPage" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-700">Form Mentoring</h2>
            <span id="badgeInfo" class="px-4 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-full border border-slate-200"></span>
        </div>
        
        <form id="mentoringForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-400 ml-1 uppercase">Tanggal & Hari</label>
                <input type="date" id="tanggal" required class="w-full mt-1 p-3 border border-slate-200 rounded-xl outline-none focus:border-slate-400 bg-slate-50 text-sm">
                <input type="text" id="hari" placeholder="Hari otomatis" readonly class="w-full mt-2 p-3 border border-slate-100 rounded-xl bg-slate-100 text-slate-500 italic text-sm">
            </div>

            <input type="text" id="mentor" placeholder="Nama Mentor" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-slate-400 text-sm">
            <textarea id="peserta" placeholder="Nama Peserta (Pisahkan dengan koma)" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-slate-400 h-24 text-sm"></textarea>
            <input type="text" id="kelas" placeholder="Kelas (Contoh: XI-2)" required class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-slate-400 text-sm">
            <input type="url" id="dokumentasi" placeholder="Link Dokumentasi (Opsional)" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-slate-400 text-sm">
            
            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg transition-all cursor-pointer">
                    Kirim Laporan
                </button>
                <button type="button" onclick="showAdmin()" class="w-full mt-4 py-2 text-sm text-slate-400 font-bold hover:text-slate-600 cursor-pointer">
                    Lihat Data Mentoring →
                </button>
            </div>
        </form>
    </div>

    <div id="adminPage" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-slate-700">Riwayat Laporan</h2>
            <button onclick="showPage('formPage')" class="text-sm font-bold text-slate-500 hover:text-slate-800 underline cursor-pointer">+ Isi Baru</button>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="tabAkhwat" onclick="filterTab('Akhwat')" class="flex-1 py-2 rounded-xl font-bold text-xs bg-pink-400 text-white shadow-md transition-all">🌸 Akhwat</button>
            <button id="tabIkhwan" onclick="filterTab('Ikhwan')" class="flex-1 py-2 rounded-xl font-bold text-xs bg-slate-100 text-slate-400 transition-all">🛡️ Ikhwan</button>
        </div>

        <div class="rounded-2xl border border-slate-100 overflow-hidden bg-white">
            <table class="w-full text-left text-sm">
                <tbody id="dataTable">
                    <tr><td class="p-8 text-center text-slate-400 italic font-medium">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <button onclick="showPage('landing')" class="w-full mt-6 text-xs text-slate-400 text-center block hover:underline">Kembali ke Menu Utama</button>
    </div>
</div>

<script>
// Masukkan URL Web App Google Script kamu di bawah ini
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyg20Kf7FlFmc8NWZzOMzci2RXC1AE19ofzylmW-iG9i5vujVGACkoxQbXAKUgkA0JDNg/exec";

let selectedGender = "";
let selectedAngkatan = "";
let allData = [];
let currentTab = "Akhwat";

function showPage(pageId) {
    document.querySelectorAll('#landing, #angkatanPage, #formPage, #adminPage').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
}

function selectGender(gender){
    selectedGender = gender;
    const btn = document.getElementById('submitBtn');
    btn.className = gender === 'Akhwat' 
        ? "w-full py-4 bg-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all" 
        : "w-full py-4 bg-blue-400 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-500 transition-all";
    showPage('angkatanPage');
}

function selectAngkatan(angkatan){
    selectedAngkatan = angkatan;
    const infoText = angkatan === 'Lainnya' ? selectedGender + " - Umum" : selectedGender + " - A" + angkatan;
    document.getElementById('badgeInfo').innerText = infoText;
    showPage('formPage');
}

function showAdmin(){
    showPage('adminPage');
    loadData();
}

document.getElementById('tanggal').addEventListener('change', function(){
    const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const d = new Date(this.value);
    document.getElementById('hari').value = hariList[d.getDay()];
});

function filterTab(gender) {
    currentTab = gender;
    const tabA = document.getElementById('tabAkhwat');
    const tabI = document.getElementById('tabIkhwan');

    if(gender === 'Akhwat') {
        tabA.className = "flex-1 py-2 rounded-xl font-bold text-xs bg-pink-400 text-white shadow-md transition-all";
        tabI.className = "flex-1 py-2 rounded-xl font-bold text-xs bg-slate-100 text-slate-400 transition-all";
    } else {
        tabI.className = "flex-1 py-2 rounded-xl font-bold text-xs bg-blue-400 text-white shadow-md transition-all";
        tabA.className = "flex-1 py-2 rounded-xl font-bold text-xs bg-slate-100 text-slate-400 transition-all";
    }
    renderTable();
}

document.getElementById('mentoringForm').addEventListener('submit', function(e){
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerText;
    btn.innerText = "Mengirim...";
    btn.disabled = true;

    const data = {
        jenis: selectedGender,
        angkatan: selectedAngkatan,
        hari: document.getElementById('hari').value,
        tanggal: document.getElementById('tanggal').value,
        mentor: document.getElementById('mentor').value,
        peserta: document.getElementById('peserta').value,
        kelas: document.getElementById('kelas').value,
        dokumentasi: document.getElementById('dokumentasi').value || "-"
    };

    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("✅ Laporan Berhasil Terkirim!");
        document.getElementById('mentoringForm').reset();
        btn.innerText = originalText;
        btn.disabled = false;
        currentTab = selectedGender;
        showAdmin();
    })
    .catch(err => {
        alert("❌ Gagal mengirim: " + err);
        btn.disabled = false;
    });
});

function loadData() {
    const table = document.getElementById('dataTable');
    table.innerHTML = `<tr><td class="p-8 text-center text-slate-400 italic">Memuat database...</td></tr>`;

    fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {
        allData = data;
        renderTable();
    })
    .catch(() => {
        table.innerHTML = `<tr><td class="p-8 text-center text-red-300 italic text-xs">Database belum terhubung. Pastikan URL benar dan sudah di-Deploy.</td></tr>`;
    });
}

function renderTable() {
    const table = document.getElementById('dataTable');
    const filtered = allData.filter(item => item.jenis === currentTab);
    
    if (filtered.length === 0) {
        table.innerHTML = `<tr><td class="p-8 text-center text-slate-400 italic">Belum ada data ${currentTab}.</td></tr>`;
        return;
    }

    table.innerHTML = "";
    filtered.reverse().forEach(item => {
        const angText = item.angkatan === 'Lainnya' ? "Umum" : "Angkatan " + item.angkatan;
        table.innerHTML += `
            <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                <td class="p-4">
                    <div class="font-bold text-slate-700 text-[11px]">${item.tanggal}</div>
                    <div class="text-[9px] text-slate-400 uppercase font-bold">${angText}</div>
                </td>
                <td class="p-4">
                    <div class="font-semibold text-slate-600 text-xs">${item.mentor}</div>
                    <div class="text-[10px] text-slate-400">${item.kelas}</div>
                </td>
                <td class="p-4 text-right">
                    ${item.dokumentasi !== "-" ? `<a href="${item.dokumentasi}" target="_blank" class="text-blue-500 text-[10px] font-bold underline bg-blue-50 px-2 py-1 rounded">Link</a>` : "<span class='text-slate-300 text-[10px] italic'>No File</span>"}
                </td>
            </tr>`;
    });
}
</script>

</body>
</html>
